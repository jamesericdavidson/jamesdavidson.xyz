baseURL = "https://jamesdavidson.xyz/"
copyright = "This work is licensed under [CC BY-ND 4.0](https://creativecommons.org/licenses/by-nd/4.0)."
defaultContentLanguage = "en"
enableEmoji = true
enableRobotsTXT = true
languageCode = "en"
title = "James Davidson"

[params]
  avatarSize = "size-xs"
  avatarURL = "/images/avatar.webp"
  description = "Radio Presenter and Podcast Host"
  fontSize = "20px"
  footer = "James Davidson"
  metaKeywords = ["swing with jim", "jibber jabber with jim", "fcr plymouth",
      "ferndale community radio"]
  showBackToTopButton = true

  socialIcons = [
    {name = "spotify", url = "https://creators.spotify.com/pod/show/jibberjabberwithjim/"},
    {name = "youtube", url = "https://www.youtube.com/channel/UCPiMq6YLZieMieOuZ8GJfrg"},
    {name = "linkedin", url = "https://www.linkedin.com/in/jamesericdavidson"},
    {name = "bluesky", url = "https://bsky.app/profile/jamesdavidson.xyz"}
  ]

[menu]

  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
    pre = "<span data-feather='home'></span>"

  [[menu.main]]
    name = "Radio"
    url = "/swingwithjim/"
    weight = 2
    pre = "<span data-feather='headphones'></span>"

  [[menu.main]]
    name = "Podcast"
    url = "/jibberjabberwithjim/"
    weight = 3
    pre = "<span data-feather='mic'></span>"

  [[menu.main]]
    name = "Testimonials"
    url = "/testimonials/"
    weight = 4
    pre = "<span data-feather='edit-3'></span>"

  [[menu.main]]
    name = "Contact"
    weight = 99
    url = "mailto:james@jamesdavidson.xyz"
    pre = "<span data-feather='mail'></span>"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[sitemap]
  changeFreq = "weekly"

[minify]
  minifyOutput = true

[module]
  [[module.imports]]
    path = "github.com/gokarna-theme/gokarna-hugo"

[privacy]
  [privacy.youtube]
    privacyEnhanced = true
